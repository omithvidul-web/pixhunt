name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Configure signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using provided release keystore."
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            cat > keystore.properties <<EOF
          storeFile=$(pwd)/release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          else
            echo "No release keystore provided. Generating debug keystore for signing."
            keytool -genkeypair -v \
              -keystore release.keystore \
              -storetype PKCS12 \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias pixhunt \
              -storepass android -keypass android \
              -dname "CN=PixHunt, OU=Dev, O=PixHunt, L=NA, S=NA, C=US"
            cat > keystore.properties <<EOF
          storeFile=$(pwd)/release.keystore
          storePassword=android
          keyAlias=pixhunt
          keyPassword=android
          EOF
          fi

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Build Release AAB
        run: ./gradlew :app:bundleRelease --stacktrace

      - name: Verify APK signature (apksigner)
        run: |
          BUILD_TOOLS_DIR=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -n 1)
          APKSIGNER="${BUILD_TOOLS_DIR}apksigner"
          echo "Using apksigner at: $APKSIGNER"
          APK_PATH=$(ls app/build/outputs/apk/release/*.apk | head -n 1)
          echo "Verifying: $APK_PATH"
          "$APKSIGNER" verify --verbose --print-certs "$APK_PATH"
          echo "APK signature verification succeeded — installable on devices."

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixhunt-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: pixhunt-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
